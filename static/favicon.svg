<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 胶片左侧方块 -->
  <rect x="8" y="20" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="8" y="29" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="8" y="38" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- 胶片右侧方块 -->
  <rect x="50" y="20" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="50" y="29" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="50" y="38" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- 胶片主体 -->
  <rect x="16" y="16" width="32" height="32" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- 播放三角形 -->
  <polygon points="26,22 26,42 44,32" fill="white"/>
